      protein_note: moderate protein, better with sambar or tofu support
      for_you: Keep the ghee light and pair with sambar or tofu for easier digestion.
      for_varshit: Uttapam is more filling, but protein should still come from sides too.
      ingredients:
        - name: ID dosa batter or priya bhabhi home made dosa batter
          qty: 4 cups
        - name: onion
          qty: 1 medium
        - name: tomato
          qty: 1 medium
        - name: Ginpowder podi by yours freshly
          qty: 2 tbsp
        - name: ghee
          qty: 4 tsp in each dosa
        - name: curry leaves
          qty: 1 sprig
      method:
        - Chop onion, carrot and tomato for uttapam topping.
        - Make uttapam for Varshit and light ghee podi dosa for Shreya.
        - Serve with a simple side like tofu or sambar if available.
    - name: Rice Paper Rolls
      summary: Fresh rice paper rolls with tofu and crunchy vegetables for a lighter shared meal.
      cook_time: 25 min
      cook_summary: Prep filling, soften wrappers, roll, and serve with dip.
      complexity: medium
      protein_note: moderate protein from tofu, lighter than wraps or rice meals
      for_you: Keep the rolls soft and not overfilled.
      for_varshit: Use a fuller tofu filling and more rolls for satiety.
      ingredients:
