          qty: 6 to 8
        - name: tofu
          qty: 200 g
        - name: cucumber
          qty: 1
        - name: carrot
          qty: 1
        - name: capsicum
          qty: 1
        - name: lettuce or cabbage
          qty: optional
        - name: green chutney or peanut dip
          qty: as needed
        - name: salt
          qty: to taste
        - name: black pepper
          qty: to taste
      method:
        - Finely slice all vegetables and crumble or chop tofu.
        - Season the filling lightly with salt and black pepper.
        - Soften each rice paper sheet briefly in water.
        - Fill, roll tightly, and serve with chutney or dip.

  fruits:
    - name: Daily Fixed Add-ons
      summary: Anar, soaked dry fruits, seeds, sattu drink, and protein shake.
      cook_time: 15 min
      cook_summary: Prep anar bowls, soaked items, sattu, and timed drinks.
      complexity: very low
      protein_note: includes daily drink support
      for_you: Keep soaked items moderate and take mango separately only when wanted.
      for_varshit: Useful for steady energy without needing snacky processed food.
      ingredients:
        - name: anar
          qty: 2 medium
        - name: dates
          qty: 2 to 4
        - name: almonds
          qty: 10 to 12
        - name: pumpkin seeds
          qty: 2 tbsp
        - name: kali kishmish
          qty: 2 tbsp
        - name: sattu
          qty: 4 tbsp
      method:
        - Prepare two anar bowls.
        - Soak dates, almonds, pumpkin seeds, and kali kishmish ahead.
        - Make sattu drink and keep timed drinks as per routine.
    - name: Daily Add-ons plus Mango
      summary: Fixed daily items plus a small Amrapali or Kesar ripe mango portion for you.
      cook_time: 15 min
      cook_summary: Prep fixed add-ons and slice a small Amrapali or Kesar ripe mango portion.
      complexity: very low
      protein_note: includes daily drink support
      for_you: Best on days with lighter brunch choices.
      for_varshit: Keep the fixed items and skip mango if staying tighter on deficit.
      ingredients:
        - name: anar
          qty: 2 medium
        - name: dates
          qty: 2 to 4
        - name: almonds
          qty: 10 to 12
        - name: pumpkin seeds
          qty: 2 tbsp
        - name: kali kishmish
          qty: 2 tbsp
        - name: sattu
          qty: 4 tbsp
        - name: Amrapali or Kesar ripe mango
          qty: 1 small
      method:
        - Prepare the fixed daily items first.
        - Slice the ripe Amrapali or Kesar mango separately as a small extra portion.
    - name: Daily Add-ons plus Papaya
      summary: Fixed daily items plus papaya for a gentler fruit add-on.
      cook_time: 15 min
      cook_summary: Prep fixed add-ons and add papaya.
      complexity: very low
      protein_note: includes daily drink support
      for_you: Useful on hotter days or when digestion needs a gentler fruit.
      for_varshit: Light fruit add-on without much calorie push.
      ingredients:
        - name: anar
          qty: 2 medium
