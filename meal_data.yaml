grocery_modes:
  Home:
    buy:
      - daily anar stock
      - dates, almonds, pumpkin seeds, kali kishmish
      - sattu and whey protein
      - soya milk and bananas
      - 2 to 3 days of tofu only
      - easy vegetables for brunch mains and light dinners
      - soy curd if using
      - chhole, rajma, moong dal, rice, wheat flour
    finish:
      - old curd first
      - ripe Amrapali or Kesar mangoes first
      - cooked food within 24 hours in summer
  Vacation:
    buy:
      - only 1 day fruit
      - no large dry fruit refill
      - no extra tofu
      - no bulk vegetables
      - one small curd pack
      - enough sattu, whey protein, and soya milk only for the trip window
    finish:
      - all cooked food
      - open dairy
      - cut fruit same day
  Return:
    buy:
      - anar
      - soaked item basics
      - sattu
      - soya milk and bananas
      - whey protein
      - moong dal
      - rice
      - one easy vegetable
      - curd
      - ginger and cumin
    finish:
      - restart with easy meals
      - avoid bulk buying for 2 days

storage_notes:
  - Refrigerate dinner portions early in summer.
  - Keep fruit cut fresh, especially anar and ripe Amrapali or Kesar mango.
  - Keep curd and chopped salad separate till serving.
  - Soak dry fruits and seeds in only the amount needed for the next day.
  - Prefer shorter grocery cycles in hot weeks.
